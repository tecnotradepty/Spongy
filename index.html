<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pasarela de Pagos - Demo PagueloFacil</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .checkout-card {
      background: #ffffff;
      max-width: 450px;
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #0052cc, #002e7a);
      color: #ffffff;
      padding: 24px;
      text-align: center;
    }

    .header h2 {
      font-size: 1.25rem;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 0.875rem;
      opacity: 0.85;
    }

    .badge-demo {
      display: inline-block;
      background: #ffab00;
      color: #172b4d;
      font-size: 0.75rem;
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 12px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .amount-box {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 12px;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 1.5rem;
      font-weight: bold;
    }

    .form-body {
      padding: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #344054;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d0d5dd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    .form-group input:focus {
      border-color: #0052cc;
      box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.15);
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .row .form-group {
      flex: 1;
    }

    .btn-pay {
      width: 100%;
      background-color: #0052cc;
      color: #ffffff;
      border: none;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .btn-pay:hover {
      background-color: #003d99;
    }

    .btn-pay:disabled {
      background-color: #a5adba;
      cursor: not-allowed;
    }

    .response-box {
      margin-top: 20px;
      padding: 14px;
      border-radius: 8px;
      font-size: 0.875rem;
      display: none;
    }

    .response-box.success {
      background-color: #d1e7dd;
      color: #0f5132;
      border: 1px solid #badbcc;
    }

    .response-box.error {
      background-color: #f8d7da;
      color: #842029;
      border: 1px solid #f5c2c7;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="checkout-card">
    <div class="header">
      <span class="badge-demo">Entorno Sandbox / Demo</span>
      <h2>Checkout de Pago</h2>
      <p>Procesamiento de prueba mediante PagueloFacil</p>
      <div class="amount-box">
        $25.00 <span style="font-size: 0.85rem; font-weight: normal;">USD</span>
      </div>
    </div>

    <form id="paymentForm" class="form-body">
      <div class="form-group">
        <label for="cardHolder">Nombre del Titular</label>
        <input type="text" id="cardHolder" placeholder="Ej. Juan Pérez" required />
      </div>

      <div class="form-group">
        <label for="cardNumber">Número de Tarjeta (Demo)</label>
        <input type="text" id="cardNumber" placeholder="4000 0000 0000 0002" maxlength="19" required />
      </div>

      <div class="row">
        <div class="form-group">
          <label for="expDate">Expira (MM/AA)</label>
          <input type="text" id="expDate" placeholder="12/28" maxlength="5" required />
        </div>
        <div class="form-group">
          <label for="cvv">CVV</label>
          <input type="password" id="cvv" placeholder="123" maxlength="4" required />
        </div>
      </div>

      <button type="submit" id="payBtn" class="btn-pay">
        <span id="btnText">Pagar $25.00</span>
        <div class="spinner" id="btnSpinner"></div>
      </button>

      <div id="responseBox" class="response-box"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('paymentForm');
    const payBtn = document.getElementById('payBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const responseBox = document.getElementById('responseBox');

    // Formatear número de tarjeta en bloques de 4 dígitos
    document.getElementById('cardNumber').addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');
      value = value.replace(/(.{4})/g, '$1 ').trim();
      e.target.value = value;
    });

    // Formatear fecha MM/AA
    document.getElementById('expDate').addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length >= 2) {
        value = value.substring(0, 2) + '/' + value.substring(2, 4);
      }
      e.target.value = value;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // UI Loading state
      payBtn.disabled = true;
      btnText.textContent = "Procesando...";
      btnSpinner.style.display = "block";
      responseBox.style.display = "none";

      const cardData = {
        holder: document.getElementById('cardHolder').value,
        number: document.getElementById('cardNumber').value.replace(/\s/g, ''),
        exp: document.getElementById('expDate').value,
        cvv: document.getElementById('cvv').value,
        amount: 25.00
      };

      // Simulación de llamada a API Sandbox de PagueloFacil
      setTimeout(() => {
        // En PagueloFacil Sandbox, cualquier tarjeta válida que empiece en 4000 pasa como exitosa
        const isSuccess = cardData.number.length >= 15;

        payBtn.disabled = false;
        btnText.textContent = "Pagar $25.00";
        btnSpinner.style.display = "none";
        responseBox.style.display = "block";

        if (isSuccess) {
          const mockAuthCode = Math.floor(100000 + Math.random() * 900000);
          const mockTxId = "PF-DEMO-" + Date.now().toString().slice(-6);

          responseBox.className = "response-box success";
          responseBox.innerHTML = `
            <strong>¡Pago Aprobado!</strong><br>
            • ID Transacción: <strong>${mockTxId}</strong><br>
            • Código Autorización: <strong>${mockAuthCode}</strong><br>
            • Monto: $${cardData.amount.toFixed(2)} USD
          `;
        } else {
          responseBox.className = "response-box error";
          responseBox.innerHTML = `
            <strong>Pago Rechazado</strong><br>
            El número de tarjeta de prueba ingresado no es válido.
          `;
        }
      }, 1500);
    });
  </script>
</body>
</html>
