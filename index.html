<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Interactivo Vivo - techexchange</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'poster': ['Anton', 'sans-serif'],
                        'sans': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'bg-main': '#E02A2A', 
                        'text-light': '#F7F3E8', 
                        'text-dark': '#1A1A1A'
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #E02A2A; color: #F7F3E8; overflow-x: hidden; }
        .bg-text {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            font-size: clamp(150px, 40vw, 400px); line-height: 0.8; color: #F7F3E8;
            z-index: 0; white-space: nowrap; text-align: center; opacity: 0.9;
        }
        .plate-shadow { box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6); }
        ::-webkit-scrollbar { display: none; }
        
        /* Animaciones para los modales */
        .slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="font-sans antialiased pb-32 relative">

    <!-- NAV -->
    <nav class="relative z-40 flex justify-between items-center p-6 text-text-light">
        <div class="font-poster text-2xl tracking-wider">MESA 05</div>
        <div class="flex gap-4">
            <button onclick="alert('Llamando al mesero...')" class="bg-black/20 backdrop-blur w-10 h-10 rounded-full flex items-center justify-center shadow-lg hover:bg-black/40 transition">
                <i class="fa-solid fa-bell"></i>
            </button>
        </div>
    </nav>

    <!-- HEADER / HERO -->
    <header class="relative w-full min-h-[70vh] flex flex-col items-center justify-start pt-10">
        <div class="font-poster bg-text uppercase select-none pointer-events-none flex flex-col">
            <span>SU</span><span>SHI</span>
        </div>

        <div class="relative z-10 mt-12 mb-8 group">
            <div class="w-64 h-64 md:w-96 md:h-96 rounded-full overflow-hidden border-8 border-bg-main plate-shadow transform transition duration-500 group-hover:scale-105">
                <img src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?q=80&w=1000&auto=format&fit=crop" alt="Sushi Platter" class="w-full h-full object-cover">
            </div>
            <div class="absolute -bottom-4 -right-4 bg-black text-text-light font-poster text-3xl px-6 py-2 rounded-full transform rotate-12 shadow-xl">$45</div>
        </div>

        <div class="relative z-10 text-center px-4">
            <h2 class="font-poster text-4xl tracking-wide mb-2 text-text-dark">TOKIO PLATTER</h2>
            <button onclick="addToCart('tokio', 'Tokio Platter', 45)" class="mt-4 bg-text-dark text-text-light px-8 py-3 rounded-full text-sm font-bold uppercase tracking-wider hover:scale-105 transition transform shadow-lg">Añadir al pedido</button>
        </div>
    </header>

    <!-- MENÚ ITEMS -->
    <main class="relative z-10 max-w-md mx-auto px-6 mt-12 space-y-8">
        <!-- Item 1 -->
        <div class="flex items-center gap-4 bg-black/10 p-4 rounded-3xl backdrop-blur-sm border border-white/10">
            <img src="https://images.unsplash.com/photo-1611143669185-af224c5e3252?q=80&w=400&auto=format&fit=crop" class="w-24 h-24 rounded-full object-cover plate-shadow border-4 border-bg-main" alt="Roll">
            <div class="flex-1">
                <h3 class="font-poster text-2xl text-text-dark">GANGNAM CRUNCH</h3>
                <p class="text-xs text-text-light/90 mb-2 font-semibold">Tempura shrimp, spicy mayo.</p>
                <div class="flex justify-between items-center">
                    <span class="font-poster text-xl">$16</span>
                    <button onclick="addToCart('gangnam', 'Gangnam Crunch', 16)" class="bg-text-dark text-text-light px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wider hover:bg-black transition">Añadir</button>
                </div>
            </div>
        </div>

        <!-- Item 2 -->
        <div class="flex items-center gap-4 bg-black/10 p-4 rounded-3xl backdrop-blur-sm border border-white/10">
            <img src="https://images.unsplash.com/photo-1553621042-f6e147245754?q=80&w=400&auto=format&fit=crop" class="w-24 h-24 rounded-full object-cover plate-shadow border-4 border-bg-main" alt="Roll">
            <div class="flex-1">
                <h3 class="font-poster text-2xl text-text-dark">NORI CLASSIC</h3>
                <p class="text-xs text-text-light/90 mb-2 font-semibold">Tuna, cucumber, scallion.</p>
                <div class="flex justify-between items-center">
                    <span class="font-poster text-xl">$14</span>
                    <button onclick="addToCart('nori', 'Nori Classic', 14)" class="bg-text-dark text-text-light px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wider hover:bg-black transition">Añadir</button>
                </div>
            </div>
        </div>
    </main>

    <!-- BOTÓN DE PAGO GIGANTE (Flotante) -->
    <div id="cart-button-container" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 w-[90%] max-w-sm z-40 hidden opacity-0 transition-opacity duration-300">
        <button onclick="openCart()" class="w-full bg-text-dark text-text-light flex justify-between items-center px-8 py-5 rounded-full shadow-2xl overflow-hidden group">
            <span class="font-bold text-sm uppercase tracking-widest relative z-10 flex items-center gap-2">
                <i class="fa-solid fa-basket-shopping"></i> Ver Cuenta
            </span>
            <div class="flex items-center gap-3 relative z-10">
                <span id="cart-total-btn" class="font-poster text-2xl text-bg-main">$0.00</span>
                <div class="bg-bg-main w-10 h-10 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-arrow-right text-text-light"></i>
                </div>
            </div>
        </button>
    </div>

    <!-- MODAL: CARRITO DE COMPRAS -->
    <div id="cart-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex-col justify-end backdrop-blur-sm fade-in">
        <div class="bg-text-dark w-full h-[80vh] rounded-t-3xl p-6 flex flex-col slide-up relative">
            <button onclick="closeCart()" class="absolute top-4 right-6 text-text-light/50 hover:text-white text-2xl"><i class="fa-solid fa-times"></i></button>
            <h2 class="font-poster text-4xl text-bg-main mb-6">TU PEDIDO</h2>
            
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4 pr-2">
                <!-- Items inyectados por JS -->
            </div>

            <div class="mt-6 border-t border-white/10 pt-4">
                <div class="flex justify-between text-lg font-bold mb-4 text-text-light">
                    <span>TOTAL</span>
                    <span id="cart-total-modal" class="font-poster text-3xl text-bg-main">$0.00</span>
                </div>
                <button onclick="showPayment()" class="w-full bg-bg-main text-text-light font-poster text-2xl py-4 rounded-xl shadow-lg hover:bg-red-600 transition tracking-widest">
                    PAGAR AHORA
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL: MÉTODOS DE PAGO -->
    <div id="payment-modal" class="fixed inset-0 bg-black/90 z-[60] hidden flex-col items-center justify-center backdrop-blur-md fade-in px-4">
        <h2 class="font-poster text-4xl text-text-light mb-8 text-center">MÉTODO DE PAGO</h2>
        
        <div class="w-full max-w-sm space-y-4">
            <button onclick="confirmPayment('Yappy')" class="w-full bg-[#002B5C] text-white flex items-center justify-between p-5 rounded-2xl hover:scale-105 transition transform shadow-lg">
                <span class="font-bold text-xl tracking-wider">YAPPY</span>
                <i class="fa-solid fa-mobile-screen-button text-2xl"></i>
            </button>
            
            <button onclick="confirmPayment('Tarjeta')" class="w-full bg-zinc-800 text-white flex items-center justify-between p-5 rounded-2xl hover:scale-105 transition transform shadow-lg">
                <span class="font-bold text-xl tracking-wider">TARJETA</span>
                <i class="fa-regular fa-credit-card text-2xl"></i>
            </button>
            
            <button onclick="confirmPayment('Efectivo')" class="w-full bg-emerald-600 text-white flex items-center justify-between p-5 rounded-2xl hover:scale-105 transition transform shadow-lg">
                <span class="font-bold text-xl tracking-wider">EFECTIVO</span>
                <i class="fa-solid fa-money-bill-wave text-2xl"></i>
            </button>

            <button onclick="cancelPayment()" class="w-full text-center text-text-light/50 font-bold text-sm uppercase tracking-widest mt-6 py-2">
                Volver al carrito
            </button>
        </div>
    </div>

    <!-- MODAL: CONFIRMACIÓN DE PEDIDO -->
    <div id="success-modal" class="fixed inset-0 bg-bg-main z-[70] hidden flex-col items-center justify-center fade-in px-6 text-center">
        <div class="w-24 h-24 bg-text-dark rounded-full flex items-center justify-center mb-6 shadow-2xl">
            <i class="fa-solid fa-check text-5xl text-bg-main"></i>
        </div>
        <h2 class="font-poster text-5xl text-text-dark mb-4 leading-tight">¡PEDIDO<br>CONFIRMADO!</h2>
        <p id="success-message" class="text-lg font-semibold text-text-light/90 mb-10 max-w-xs mx-auto">
            El pago mediante fue exitoso. La cocina ya está preparando tu orden.
        </p>
        <button onclick="resetApp()" class="bg-text-dark text-text-light px-8 py-4 rounded-full font-bold uppercase tracking-widest shadow-lg">
            Volver al menú
        </button>
    </div>

    <script>
        let cart = {};

        function addToCart(id, name, price) {
            if (cart[id]) { cart[id].qty++; } 
            else { cart[id] = { name, price, qty: 1 }; }
            updateApp();
            
            // Feedback visual rápido
            const btn = event.currentTarget;
            const originalText = btn.innerText;
            btn.innerText = '✓';
            setTimeout(() => { btn.innerText = originalText; }, 500);
        }

        function changeQty(id, delta) {
            if (cart[id]) {
                cart[id].qty += delta;
                if (cart[id].qty <= 0) delete cart[id];
                updateApp();
            }
        }

        function updateApp() {
            let total = 0;
            let itemCount = 0;
            const cartItemsContainer = document.getElementById('cart-items');
            cartItemsContainer.innerHTML = '';

            for (let id in cart) {
                const item = cart[id];
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                itemCount += item.qty;

                cartItemsContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-black/20 p-4 rounded-2xl">
                        <div class="flex-1">
                            <h4 class="font-poster text-xl text-text-light">${item.name}</h4>
                            <div class="text-bg-main font-bold">$${item.price.toFixed(2)} c/u</div>
                        </div>
                        <div class="flex items-center gap-3 bg-black/40 rounded-full px-3 py-1">
                            <button onclick="changeQty('${id}', -1)" class="w-8 h-8 flex items-center justify-center text-text-light/70 hover:text-white"><i class="fa-solid fa-minus text-sm"></i></button>
                            <span class="font-bold text-lg text-text-light w-4 text-center">${item.qty}</span>
                            <button onclick="changeQty('${id}', 1)" class="w-8 h-8 flex items-center justify-center text-text-light/70 hover:text-white"><i class="fa-solid fa-plus text-sm"></i></button>
                        </div>
                    </div>
                `;
            }

            const formattedTotal = `$${total.toFixed(2)}`;
            document.getElementById('cart-total-btn').innerText = formattedTotal;
            document.getElementById('cart-total-modal').innerText = formattedTotal;

            const cartBtn = document.getElementById('cart-button-container');
            if (itemCount > 0) {
                cartBtn.classList.remove('hidden');
                setTimeout(() => cartBtn.classList.remove('opacity-0'), 10);
            } else {
                cartBtn.classList.add('opacity-0');
                setTimeout(() => cartBtn.classList.add('hidden'), 300);
                closeCart(); // Si se vacía estando abierto, se cierra
            }
        }

        function openCart() { document.getElementById('cart-modal').classList.remove('hidden'); document.getElementById('cart-modal').classList.add('flex'); }
        function closeCart() { document.getElementById('cart-modal').classList.add('hidden'); document.getElementById('cart-modal').classList.remove('flex'); }
        
        function showPayment() {
            closeCart();
            document.getElementById('payment-modal').classList.remove('hidden');
            document.getElementById('payment-modal').classList.add('flex');
        }
        
        function cancelPayment() {
            document.getElementById('payment-modal').classList.add('hidden');
            document.getElementById('payment-modal').classList.remove('flex');
            openCart();
        }

        function confirmPayment(method) {
            document.getElementById('payment-modal').classList.add('hidden');
            document.getElementById('payment-modal').classList.remove('flex');
            
            document.getElementById('success-message').innerText = `Tu pago de ${document.getElementById('cart-total-btn').innerText} mediante ${method} fue procesado con éxito.`;
            
            document.getElementById('success-modal').classList.remove('hidden');
            document.getElementById('success-modal').classList.add('flex');
        }

        function resetApp() {
            cart = {};
            updateApp();
            document.getElementById('success-modal').classList.add('hidden');
            document.getElementById('success-modal').classList.remove('flex');
        }
    </script>
</body>
</html>
