<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Real Sandbox - PagueloFacil</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { background: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { background: #fff; max-width: 450px; width: 100%; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
    .header { background: #0052cc; color: white; padding: 20px; text-align: center; }
    .form { padding: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #333; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; }
    .row { display: flex; gap: 10px; }
    .btn { width: 100%; background: #0052cc; color: white; border: none; padding: 12px; font-size: 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn:disabled { background: #a5adba; cursor: not-allowed; }
    .response { margin-top: 15px; padding: 12px; border-radius: 6px; font-size: 0.85rem; display: none; word-break: break-all; }
    .success { background: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
    .error { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <h2>PagueloFacil Sandbox</h2>
      <p>Procesamiento Real de Pruebas</p>
      <h3 style="margin-top: 10px;">$1.00 USD</h3>
    </div>

    <form id="payForm" class="form">
      <div class="form-group">
        <label>Nombre del Titular</label>
        <input type="text" id="name" value="Juan Perez" required />
      </div>
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" id="email" value="cliente@prueba.com" required />
      </div>
      <div class="form-group">
        <label>Tarjeta (Sandbox Visa)</label>
        <input type="text" id="cardNumber" value="4000 0000 0000 0002" required />
      </div>
      <div class="row">
        <div class="form-group" style="flex: 1;">
          <label>Exp (MM/YY)</label>
          <input type="text" id="exp" value="12/28" required />
        </div>
        <div class="form-group" style="flex: 1;">
          <label>CVV</label>
          <input type="text" id="cvv" value="123" required />
        </div>
      </div>

      <button type="submit" id="submitBtn" class="btn">Procesar en Sandbox</button>
      <div id="responseBox" class="response"></div>
    </form>
  </div>

  <script>
    // Tu Token de PagueloFacil Sandbox
    const CCL_TOKEN = "FEBC340A223C788426ABE7816370104AC87C40732F8F433276FF26428B72F872E15E91ED5B2FABA83B4A857BE064C0E8655D3AAAA77944C88F6E20925F3FB543";
    const SANDBOX_ENDPOINT = "https://sandbox.paguelofacil.com/eCommerce/api/p2p";

    document.getElementById('payForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = document.getElementById('submitBtn');
      const responseBox = document.getElementById('responseBox');

      btn.disabled = true;
      btn.textContent = "Conectando con PagueloFacil...";
      responseBox.style.display = "none";

      const expValue = document.getElementById('exp').value.split('/');

      // Payload requerido por la API Rest de PagueloFacil
      const requestData = {
        cclToken: CCL_TOKEN,
        amount: 1.00,
        taxAmount: 0.00,
        email: document.getElementById('email').value,
        phone: "60000000",
        concept: "Compra de Prueba Sandbox",
        description: "Prueba desde HTML",
        cardNumber: document.getElementById('cardNumber').value.replace(/\s/g, ''),
        expMonth: expValue[0],
        expYear: expValue[1],
        cvv: document.getElementById('cvv').value,
        cardHolder: document.getElementById('name').value
      };

      try {
        const response = await fetch(SANDBOX_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': CCL_TOKEN
          },
          body: JSON.stringify(requestData)
        });

        const data = await response.json();

        btn.disabled = false;
        btn.textContent = "Procesar en Sandbox";
        responseBox.style.display = "block";

        if (data.headerStatus && data.headerStatus.code === 200 || data.success) {
          responseBox.className = "response success";
          responseBox.innerHTML = `
            <strong>¡Pago registrado exitosamente!</strong><br><br>
            • ID Transacción: <strong>${data.data?.codOper || data.codOper || 'Ok'}</strong><br>
            • Estado: ${data.message || 'Aprobado'}<br><br>
            <em>Ya puedes revisar tu Merchant Dashboard en PagueloFacil Sandbox.</em>
          `;
        } else {
          responseBox.className = "response error";
          responseBox.innerHTML = `
            <strong>Respuesta de API:</strong><br>
            ${data.message || data.headerStatus?.description || JSON.stringify(data)}
          `;
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Procesar en Sandbox";
        responseBox.style.display = "block";
        responseBox.className = "response error";
        responseBox.innerHTML = `
          <strong>Error de Red / CORS:</strong><br>
          No se pudo completar la petición HTTP. Revisa la consola (F12).<br>
          <em>Nota: Si el navegador bloquea CORS, debes ejecutar esta petición desde tu servidor Backend (Node.js/PHP/Python).</em>
        `;
      }
    });
  </script>
</body>
</html>
