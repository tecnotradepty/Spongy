<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev-OS | Gemini Terminal Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&swap" rel="stylesheet">
    <style>
        body { background-color: #f9f8f6; color: #191919; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .log-line { font-family: 'JetBrains Mono', monospace; font-size: 11px; border-bottom: 1px solid #e5e2db; padding: 4px 0; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #e5e2db; border-radius: 99px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-white h-14 flex items-center justify-between px-6 shrink-0 border-b border-[#e5e2db] z-50">
        <div class="flex items-center gap-2">
            <div class="w-6 h-6 rounded bg-[#cc5a37] flex items-center justify-center shadow-sm">
                <i class="fa-solid fa-sparkles text-white text-[10px]"></i>
            </div>
            <span class="font-bold text-sm tracking-tight">Gemini Workspace v5</span>
        </div>
        <div class="text-xs font-mono bg-[#f5f3ef] border border-[#e5e2db] px-2.5 py-1 rounded-md text-[#6b6a65]">
            Model: gemini-1.5-flash-latest
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <main class="flex-1 flex flex-col bg-white">
            
            <div class="p-3 bg-[#fbfaf7] border-b border-[#e5e2db] flex flex-col sm:flex-row items-center gap-2">
                <span class="text-xs font-semibold text-[#6b6a65] shrink-0"><i class="fa-solid fa-key mr-1"></i> Configurar API Key:</span>
                <input id="key-input-field" type="password" placeholder="Ingresa tu clave de Google AI Studio (AIzaSy...)" 
                       class="w-full bg-white border border-[#c2beb5] rounded-lg px-3 py-1 text-xs text-[#191919] focus:outline-none focus:border-[#cc5a37]">
                <button onclick="updateManualKey()" class="bg-[#3b82f6] hover:bg-blue-600 text-white text-xs font-semibold px-3 py-1.5 rounded-lg shadow-sm transition-all cursor-pointer">
                    <i class="fa-solid fa-floppy-disk mr-1"></i> Guardar Clave
                </button>
            </div>

            <div id="chat-window" class="flex-1 p-6 overflow-y-auto flex flex-col gap-4 bg-[#fbfaf7]">
                <div class="text-center text-xs text-[#8c8a81] bg-white border border-[#e5e2db] rounded-lg py-2 px-4 mx-auto shadow-sm">
                    Ingresa tu API Key arriba e inicia una conversación con Gemini 1.5 Flash.
                </div>
            </div>

            <div class="p-4 bg-white border-t border-[#e5e2db]">
                <div class="flex items-end gap-2 bg-[#faf9f5] border border-[#c2beb5] rounded-xl p-2.5 focus-within:border-[#cc5a37] shadow-sm">
                    <textarea id="chat-input" rows="2" placeholder="Escribe un prompt técnico..." class="flex-1 bg-transparent text-sm text-[#191919] placeholder-[#8c8a81] resize-none focus:outline-none leading-relaxed font-sans" onkeydown="handleEnter(event)"></textarea>
                    <button onclick="sendPrompt()" class="w-12 h-12 flex items-center justify-center rounded-xl bg-[#cc5a37] text-white hover:bg-[#b04828] active:scale-95 shadow-md shrink-0 cursor-pointer">
                        <i class="fa-solid fa-paper-plane text-sm"></i>
                    </button>
                </div>
            </div>
        </main>

        <aside class="w-96 bg-[#f5f3ef] border-l border-[#e5e2db] flex flex-col shrink-0 shadow-inner">
            <div class="p-4 border-b border-[#e5e2db] bg-white flex justify-between items-center">
                <div class="flex items-center gap-2 text-xs font-bold uppercase tracking-wider text-[#cc5a37]">
                    <i class="fa-solid fa-bug text-sm"></i> Registro de Fallos
                </div>
                <div class="flex items-center gap-1.5">
                    <button onclick="copyLastLog()" class="bg-[#f3f0eb] hover:bg-[#e5e2db] text-[#191919] text-[11px] font-semibold px-2.5 py-1 rounded border border-[#border-color] transition-colors flex items-center gap-1">
                        <i class="fa-solid fa-copy"></i> Copiar Error
                    </button>
                    <button onclick="clearLogs()" class="text-[#8c8a81] hover:text-[#191919] text-xs transition-colors p-1"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
            
            <div id="log-console" class="flex-1 p-4 overflow-y-auto bg-[#1e1e1e] text-zinc-300 font-mono flex flex-col gap-1 select-text">
                <div class="text-emerald-400 text-xs">[SISTEMA] Consola lista para interceptar respuestas de red...</div>
            </div>
        </aside>

    </div>

    <script>
        let API_KEY = localStorage.getItem('gemini_terminal_key') || "";
        let lastErrorPayload = null;

        document.addEventListener("DOMContentLoaded", function() {
            if(API_KEY) {
                document.getElementById('key-input-field').value = API_KEY;
                writeLog("INFO", "Clave API cargada desde el almacenamiento local.");
            } else {
                writeLog("INFO", "Por favor ingresa tu API Key para comenzar.");
            }
        });

        function updateManualKey() {
            let val = document.getElementById('key-input-field').value.trim();
            if(val) {
                API_KEY = val;
                localStorage.setItem('gemini_terminal_key', API_KEY);
                writeLog("SUCCESS", "API Key guardada exitosamente en el navegador.");
            } else {
                alert("Por favor ingresa una clave antes de guardar.");
            }
        }

        function writeLog(type, message, details = null) {
            let consoleEl = document.getElementById('log-console');
            let timestamp = new Date().toLocaleTimeString();
            let colorClass = "text-zinc-400";
            
            if (type === "INFO") colorClass = "text-sky-400";
            if (type === "SUCCESS") colorClass = "text-emerald-400";
            if (type === "ERROR") colorClass = "text-red-400 font-bold";

            let logHTML = `<div class="log-line ${colorClass}">[${timestamp}] [${type}] ${message}</div>`;
            
            if (details) {
                lastErrorPayload = details;
                logHTML += `<pre class="bg-black/40 p-2 rounded text-[10px] my-1 text-zinc-500 overflow-x-auto whitespace-pre-wrap border border-zinc-800">${JSON.stringify(details, null, 2)}</pre>`;
            }
            
            consoleEl.innerHTML += logHTML;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function copyLastLog() {
            if (!lastErrorPayload) {
                alert("No hay errores para copiar.");
                return;
            }
            navigator.clipboard.writeText(JSON.stringify(lastErrorPayload, null, 2)).then(() => {
                writeLog("INFO", "¡Información del error copiada al portapapeles!");
            });
        }

        function clearLogs() {
            lastErrorPayload = null;
            document.getElementById('log-console').innerHTML = `<div class="text-emerald-400 text-xs">[SISTEMA] Consola limpia.</div>`;
        }

        async function sendPrompt() {
            let inputField = document.getElementById('chat-input');
            let chatWindow = document.getElementById('chat-window');
            let text = inputField.value.trim();
            if (!text) return;

            chatWindow.innerHTML += `<div class="flex justify-end mb-3"><div class="bg-[#f0ece3] text-[#191919] text-sm py-2 px-4 rounded-xl rounded-tr-none chat-bubble border border-[#e5e2db]/50">${text}</div></div>`;
            inputField.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            writeLog("INFO", "Enviando payload POST hacia Google AI Studio...", { targetLength: text.length });

            let typingId = 'typing-' + Date.now();
            chatWindow.innerHTML += `<div id="${typingId}" class="flex items-start gap-2 mb-3"><div class="w-5.5 h-5.5 rounded-full border border-[#e5e2db] bg-white flex items-center justify-center text-blue-500 shadow-sm"><i class="fa-solid fa-sparkles text-[9px]"></i></div><div class="bg-white border border-[#e5e2db] text-[#6b6a65] py-2 px-4 rounded-xl rounded-tl-none chat-bubble typing-indicator flex gap-1"><span></span><span></span><span></span></div></div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // CONFIGURACIÓN AJUSTADA: Usamos el identificador absoluto 'gemini-1.5-flash-latest' requerido por v1beta
            let url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=" + API_KEY;
            
            let payload = {
                contents: [{
                    parts: [{ text: text }]
                }]
            };

            try {
                let response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                writeLog("INFO", `Respuesta del servidor. Status Code: ${response.status}`);
                let data = await response.json();

                if (!response.ok) {
                    writeLog("ERROR", "Google AI Studio rechazó el token o los argumentos.", data);
                    throw new Error("API Connection Rejected");
                }

                document.getElementById(typingId).remove();

                if (data.candidates && data.candidates[0].content) {
                    let reply = data.candidates[0].content.parts[0].text;
                    writeLog("SUCCESS", "Respuesta procesada correctamente.");

                    chatWindow.innerHTML += `<div class="flex items-start gap-2 mb-3 w-full"><div class="w-5.5 h-5.5 rounded-full border border-[#e5e2db] bg-white flex items-center justify-center text-blue-500 shadow-sm"><i class="fa-solid fa-sparkles text-[9px]"></i></div><div class="bg-white border border-[#e5e2db] text-[#403f3a] text-sm py-3.5 px-4 rounded-xl rounded-tl-none chat-bubble flex-1 shadow-sm"><div class="flex justify-between items-center mb-1.5 pb-1.5 border-b border-[#f3f0eb]"><span class="text-[10px] font-bold text-blue-500">Gemini 1.5 Flash</span></div><div class="leading-relaxed whitespace-pre-wrap font-sans">${reply}</div></div></div>`;
                } else {
                    writeLog("ERROR", "Estructura de respuesta inesperada del servidor.", data);
                }
            } catch (err) {
                if (document.getElementById(typingId)) document.getElementById(typingId).remove();
                writeLog("ERROR", `Excepción de red: ${err.message}`);
                chatWindow.innerHTML += `<div class="text-xs text-red-700 bg-red-50 p-3 rounded-lg border border-red-200 my-2 mx-auto max-w-[85%] text-center font-sans">Error de autenticación o comunicación de red.</div>`;
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        window.handleEnter = function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); }
        }
    </script>
</body>
</html>
