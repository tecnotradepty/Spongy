<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Bold Poster - techexchange</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fuentes: Oswald para el texto gigante/titulares, Poppins para lectura -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'poster': ['Anton', 'sans-serif'],
                        'sans': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'bg-main': '#E02A2A', /* Rojo vibrante tipo póster */
                        'text-light': '#F7F3E8', /* Beige crema */
                        'text-dark': '#1A1A1A'
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #E02A2A; color: #F7F3E8; overflow-x: hidden; }
        
        /* Texto gigante de fondo */
        .bg-text {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(150px, 40vw, 400px);
            line-height: 0.8;
            color: #F7F3E8;
            z-index: 0;
            white-space: nowrap;
            text-align: center;
            opacity: 0.9;
        }

        /* Sombra dura para simular plato flotando */
        .plate-shadow {
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
        }

        /* Scrollbar oculta */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans antialiased pb-32">

    <!-- BARRA SUPERIOR MINIMALISTA -->
    <nav class="relative z-50 flex justify-between items-center p-6 text-text-light">
        <div class="font-poster text-2xl tracking-wider">MESA 05</div>
        <div class="flex gap-4">
            <button class="bg-text-light text-bg-main w-10 h-10 rounded-full flex items-center justify-center font-bold shadow-lg">
                <i class="fa-solid fa-star text-sm"></i>
            </button>
            <button class="bg-black/20 backdrop-blur w-10 h-10 rounded-full flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-bell"></i>
            </button>
        </div>
    </nav>

    <!-- HEADER / HERO TIPO PÓSTER -->
    <header class="relative w-full min-h-[70vh] flex flex-col items-center justify-start pt-10">
        
        <!-- TEXTO GIGANTE EN EL FONDO -->
        <div class="font-poster bg-text uppercase select-none pointer-events-none flex flex-col">
            <span>SU</span>
            <span>SHI</span>
        </div>

        <!-- PLATO CENTRAL FLOTANTE -->
        <div class="relative z-10 mt-12 mb-8 group">
            <div class="w-64 h-64 md:w-96 md:h-96 rounded-full overflow-hidden border-8 border-bg-main plate-shadow transform transition duration-500 group-hover:scale-105 group-hover:rotate-6">
                <!-- Imagen top-down de un plato de sushi -->
                <img src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?q=80&w=1000&auto=format&fit=crop" alt="Sushi Platter" class="w-full h-full object-cover">
            </div>
            
            <!-- Etiqueta de precio flotante -->
            <div class="absolute -bottom-4 -right-4 bg-black text-text-light font-poster text-3xl px-6 py-2 rounded-full transform rotate-12 shadow-xl">
                $45
            </div>
        </div>

        <div class="relative z-10 text-center px-4">
            <h2 class="font-poster text-4xl tracking-wide mb-2 text-text-dark">TOKIO PLATTER</h2>
            <p class="text-sm font-semibold text-text-light/80 max-w-xs mx-auto">Selección premium de 24 piezas. Salmón, atún rojo, anguila y aguacate.</p>
        </div>
    </header>

    <!-- LISTA DE MENÚ SECUNDARIA (Estilo Bold) -->
    <main class="relative z-10 max-w-md mx-auto px-6 mt-12 space-y-8">
        
        <div class="flex items-center gap-4 bg-black/10 p-4 rounded-3xl backdrop-blur-sm border border-white/10">
            <img src="https://images.unsplash.com/photo-1611143669185-af224c5e3252?q=80&w=400&auto=format&fit=crop" class="w-24 h-24 rounded-full object-cover plate-shadow border-4 border-bg-main" alt="Roll">
            <div class="flex-1">
                <h3 class="font-poster text-2xl text-text-dark">GANGNAM CRUNCH</h3>
                <p class="text-xs text-text-light/90 mb-2 font-semibold">Tempura shrimp, spicy mayo.</p>
                <div class="flex justify-between items-center">
                    <span class="font-poster text-xl">$16</span>
                    <button class="bg-text-dark text-text-light px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wider">Añadir</button>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4 bg-black/10 p-4 rounded-3xl backdrop-blur-sm border border-white/10">
            <img src="https://images.unsplash.com/photo-1553621042-f6e147245754?q=80&w=400&auto=format&fit=crop" class="w-24 h-24 rounded-full object-cover plate-shadow border-4 border-bg-main" alt="Roll">
            <div class="flex-1">
                <h3 class="font-poster text-2xl text-text-dark">NORI CLASSIC</h3>
                <p class="text-xs text-text-light/90 mb-2 font-semibold">Tuna, cucumber, scallion.</p>
                <div class="flex justify-between items-center">
                    <span class="font-poster text-xl">$14</span>
                    <button class="bg-text-dark text-text-light px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wider">Añadir</button>
                </div>
            </div>
        </div>

    </main>

    <!-- BOTÓN DE PAGO GIGANTE FLOTANTE -->
    <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 w-[90%] max-w-sm z-50">
        <button class="w-full bg-text-dark text-text-light flex justify-between items-center px-8 py-5 rounded-full shadow-2xl overflow-hidden group">
            <span class="font-bold text-sm uppercase tracking-widest relative z-10">Ver Cuenta</span>
            <div class="flex items-center gap-3 relative z-10">
                <span class="font-poster text-2xl text-bg-main group-hover:text-white transition-colors">$0.00</span>
                <div class="bg-bg-main w-10 h-10 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-arrow-right text-text-light"></i>
                </div>
            </div>
            <!-- Efecto hover -->
            <div class="absolute inset-0 bg-bg-main transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300"></div>
        </button>
    </div>

    <!-- FOOTER -->
    <div class="text-center mt-16 text-text-dark font-bold text-xs uppercase tracking-widest">
        Powered by <a href="#" class="underline">@techexchange</a>
    </div>

</body>
</html>
