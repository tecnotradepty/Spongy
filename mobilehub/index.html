<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Hub | TechExchange PTY</title>
    <!-- Tailwind CSS para un diseño ágil y limpio -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <!-- HEADER / NAVEGACIÓN -->
    <header class="border-b border-gray-800 bg-gray-900 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="text-xl font-bold tracking-wider text-teal-400">MOBILE HUB</span>
                <span class="text-xs text-gray-500 bg-gray-800 px-2 py-0.5 rounded">TechExchange PTY</span>
            </div>
            <!-- Menú de Navegación del Cliente -->
            <nav class="hidden md:flex space-x-6 text-sm font-medium">
                <button id="nav-repairs" class="text-teal-400 hover:text-teal-300 transition">Seguimiento</button>
                <button id="nav-shop" class="text-gray-400 hover:text-gray-200 transition">Tienda</button>
                <button id="nav-quote" class="text-gray-400 hover:text-gray-200 transition">Cotizar</button>
                <button id="nav-info" class="text-gray-400 hover:text-gray-200 transition">Contacto</button>
            </nav>
        </div>
    </header>

    <!-- CONTENEDOR PRINCIPAL (Aquí se inyectará la vista activa de forma dinámica) -->
    <main id="main-content" class="max-w-4xl mx-auto px-4 py-12">
        
        <!-- SECCIÓN: SEGUIMIENTO DE REPARACIONES (Por defecto activa) -->
        <section id="section-repairs" class="space-y-6">
            <div class="text-center max-w-md mx-auto space-y-3">
                <h1 class="text-3xl font-extrabold tracking-tight sm:text-4xl">Consulta tu Reparación</h1>
                <p class="text-gray-400 text-sm">Ingresa el código único que se te entregó en la sucursal física para revisar el progreso en tiempo real.</p>
            </div>

            <!-- Formulario con Máquina de Estados Integrada en la UI -->
            <div class="max-w-md mx-auto bg-gray-800 border border-gray-700 p-6 rounded-2xl shadow-xl">
                <form id="repair-search-form" class="space-y-4">
                    <div>
                        <label for="repair-code" class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Código de Ticket</label>
                        <input 
                            type="text" 
                            id="repair-code" 
                            placeholder="Ej: TX-1045" 
                            class="w-full bg-gray-900 border border-gray-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-teal-400 transition placeholder-gray-600 font-mono uppercase"
                            required
                        >
                    </div>
                    
                    <!-- Botón de Envío -->
                    <button 
                        type="submit" 
                        id="btn-search-repair"
                        class="w-full bg-teal-500 hover:bg-teal-400 text-gray-900 font-bold py-3 px-4 rounded-xl transition duration-200 flex items-center justify-center space-x-2 disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <span>Buscar Estado</span>
                    </button>
                </form>

                <!-- CONTENEDOR DE RESULTADOS (Dinámico) -->
                <div id="repair-result-container" class="mt-6 hidden">
                    <!-- Aquí el JavaScript renderizará las tarjetas de Éxito o Error de forma aislada -->
                </div>
            </div>
        </section>

    </main>

    <!-- ARCHIVO MAESTRO DE JAVASCRIPT: Declarado como tipo Módulo para usar Import/Export -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
